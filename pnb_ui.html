<div class="app">
  <div class="topbar">
    <div class="logo">
      <svg viewBox="0 0 20 20" fill="none" stroke="white" stroke-width="1.6">
        <circle cx="10" cy="10" r="7" />
        <path d="M10 6v4l2.5 2.5" />
        <path d="M5.5 10h1.5M13 10h1.5M10 5.5v1.5M10 13v1.5" />
      </svg>
    </div>
    <div>
      <h1>Quantum-Proof Systems Scanner</h1>
      <p>CBOM · PQC readiness · CRQC attack simulation · Risk scoring · Migration roadmap · PSB Hackathon 2026</p>
    </div>
  </div>

  <div class="scanrow">
    <input id="inp" type="text" placeholder="Domain or IP — e.g. pnbindia.in" />
    <button class="scanbtn" id="sbtn">Scan target</button>
  </div>

  <div class="presets">
    <span>Quick scan:</span>
    <button class="pbtn" data-target="pnbindia.in">pnbindia.in</button>
    <button class="pbtn" data-target="onlinesbi.sbi">onlinesbi.sbi</button>
    <button class="pbtn" data-target="hdfcbank.com">hdfcbank.com</button>
    <button class="pbtn" data-target="icicibank.com">icicibank.com</button>
    <button class="pbtn" data-target="pqc-safe-demo">PQC-safe demo</button>
  </div>

  <div class="pbar-wrap" id="pbw">
    <div class="pbar-fill" id="pbf"></div>
  </div>
  <div class="plabel" id="pbl"></div>
  <div class="empty" id="em">Enter a domain and hit Scan, or click a quick preset above.</div>
  <div class="results" id="res"></div>
</div>

<script>
  const API_BASE = 'http://localhost:8000';
  let crqcMode = 'arrived', cur = null;

  function runScan(target) {
    document.getElementById('em').style.display = 'none';
    document.getElementById('res').style.display = 'none';
    document.getElementById('pbw').style.display = 'block';
    document.getElementById('pbl').style.display = 'block';
    document.getElementById('sbtn').disabled = true;

    // Show real progress stages while backend works
    const stages = [
      [15, 'Connecting to backend scanner engine...'],
      [30, 'Resolving hostname and initiating TLS handshake...'],
      [50, 'Extracting X.509 certificate chain and cipher suites...'],
      [65, 'Building Cryptographic Bill of Materials (CBOM)...'],
      [80, 'Running quantum risk scoring model...'],
      [90, 'Generating PQC migration recommendations...'],
    ];
    let i = 0, done = false;
    const ticker = setInterval(() => {
      if (done || i >= stages.length) { clearInterval(ticker); return; }
      document.getElementById('pbf').style.width = stages[i][0] + '%';
      document.getElementById('pbl').textContent = stages[i][1];
      i++;
    }, 600);

    // Call backend API
    const domain = target.replace(/^https?:\/\//, '').split('/')[0];
    fetch(API_BASE + '/scan?domain=' + encodeURIComponent(domain))
      .then(r => {
        if (!r.ok) return r.json().then(e => { throw new Error(e.error || 'Scan failed') });
        return r.json();
      })
      .then(d => {
        done = true;
        document.getElementById('pbf').style.width = '100%';
        document.getElementById('pbl').textContent = 'Scan complete — rendering results...';
        setTimeout(() => render(d), 300);
      })
      .catch(err => {
        done = true;
        clearInterval(ticker);
        document.getElementById('pbw').style.display = 'none';
        document.getElementById('pbl').style.display = 'none';
        document.getElementById('sbtn').disabled = false;
        document.getElementById('em').style.display = 'block';
        document.getElementById('em').innerHTML = '<span style="color:#C0392B">⚠ ' + err.message + '</span>';
      });
  }

  document.getElementById('sbtn').addEventListener('click', function () {
    const v = document.getElementById('inp').value.trim();
    if (v) runScan(v);
  });
  document.querySelectorAll('.pbtn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      const t = btn.getAttribute('data-target');
      document.getElementById('inp').value = t;
      runScan(t);
    });
  });

  function render(d) {
    cur = d; crqcMode = 'arrived';
    document.getElementById('pbw').style.display = 'none';
    document.getElementById('pbl').style.display = 'none';
    document.getElementById('sbtn').disabled = false;

    const sc = d.score, lv = d.level;
    const rc = lv === 'HIGH' ? '#C0392B' : lv === 'MEDIUM' ? '#D68910' : '#1E8449';
    const bg = lv === 'HIGH' ? '#FDECEA' : lv === 'MEDIUM' ? '#FFF3CD' : '#EAF3DE';
    const tx = lv === 'HIGH' ? '#A32D2D' : lv === 'MEDIUM' ? '#854F0B' : '#3B6D11';
    const R = 28, C = 2 * Math.PI * R, fill = (sc / 100) * C;
    const dotCls = lv === 'HIGH' ? 'r' : lv === 'MEDIUM' ? 'a' : 'g';
    const valCls = lv === 'HIGH' ? 'r' : lv === 'MEDIUM' ? 'a' : 'g';

    // score factors
    const sfHtml = d.factors.map(f => {
      const bc = f.cat === 'crit' ? '#FDECEA' : f.cat === 'high' ? '#FFF3CD' : '#EAF3DE';
      const tc = f.cat === 'crit' ? '#A32D2D' : f.cat === 'high' ? '#854F0B' : '#1E8449';
      const barW = f.pts === 0 ? 0 : Math.min(100, Math.round((f.pts / 45) * 100));
      const barC = f.cat === 'crit' ? '#C0392B' : f.cat === 'high' ? '#D68910' : '#1E8449';
      return `<div class="srow">
      <div class="srow-f">${f.f}</div>
      <div class="sbar-bg"><div class="sbar-fg" style="width:${barW}%;background:${barC}"></div></div>
      <div class="simp" style="background:${bc};color:${tc}">${f.pts === 0 ? 'no impact' : `+${f.pts} pts`}</div>
    </div>`;
    }).join('');

    // cbom
    const cbomHtml = [
      ['Target', d.host + ' (' + d.ip + ')', 'b', 'active'],
      ['TLS version', d.tls, d.tls === 'TLS 1.3' ? 'g' : 'a', d.tls === 'TLS 1.3' ? 'optimal' : 'upgrade needed'],
      ['Cipher suite', `<span style="font-family:var(--font-mono);font-size:11px">${d.cipher}</span>`, 'gr', '—'],
      ['Key exchange', d.kex, d.algos[0].shors ? 'r' : 'g', d.algos[0].shors ? 'quantum-weak' : 'PQC-safe'],
      ['Auth / signature', d.auth, d.algos[1].shors ? 'r' : 'g', d.algos[1].shors ? 'quantum-weak' : 'PQC-safe'],
      ['Encryption', d.enc, 'g', 'quantum-adequate'],
      ['MAC', d.mac, 'g', 'quantum-adequate'],
      ['Cert signature', d.sig, d.algos[1].shors ? 'r' : 'g', d.algos[1].shors ? 'quantum-weak' : 'PQC-safe'],
      ['Public key bits', d.auth + ' — ' + d.keyBits + ' bits', 'gr', 'assessed'],
      ['Subject', d.subj, 'gr', '—'],
      ['Issuer CA', d.issuer, 'gr', '—'],
      ['Cert expiry', d.expiry, d.certOk ? 'g' : 'r', d.certOk ? 'valid' : 'expired'],
    ].map(([el, val, bc, st]) => `<tr><td style="color:var(--color-text-secondary);width:120px;font-size:12px">${el}</td><td>${val}</td><td><span class="bx ${bc}">${st}</span></td></tr>`).join('');

    // migration table
    const priMap = { CRITICAL: 'crit', HIGH: 'high', MEDIUM: 'med', LOW: 'low' };
    const migHtml = d.mig.map(m => `<tr>
    <td><span class="pri ${priMap[m.pri] || 'low'}">${m.pri}</span></td>
    <td style="font-weight:500">${m.role}</td>
    <td class="arrow-cell"><s>${m.from}</s><br><strong>→ ${m.to}</strong></td>
    <td>${m.detail}</td>
    <td><span class="bx gr">${m.standard}</span></td>
    <td><span class="effort">${m.effort}</span></td>
  </tr>`).join('');

    // roadmap
    const roadHtml = d.phases.map(p => `<div class="rmap-card">
    <div class="rmap-phase" style="color:${p.color}">${p.label}</div>
    <div class="rmap-items">${p.items.map(i => '• ' + i).join('<br>')}</div>
  </div>`).join('');

    // labels
    const lc = d.labelKey === 'ready' ? 'g' : d.labelKey === 'partial' ? 'a' : 'r';
    let lblHtml = `<span class="lbl ${lc}">${d.labelTxt}</span>`;
    if (d.hndl) lblHtml += `<span class="lbl r">HNDL Vulnerable</span>`;
    if (d.tls === 'TLS 1.3') lblHtml += `<span class="lbl b">TLS 1.3 Deployed</span>`;
    if (d.algos.some(a => a.pqc)) lblHtml += `<span class="lbl g">NIST PQC Present</span>`;

    const hndlHtml = d.hndl ? `<div class="hndl-bar"><b style="flex-shrink:0;margin-right:4px">HNDL alert —</b> Data encrypted with ${d.kex} can be harvested now and decrypted retroactively once a CRQC becomes available. Migrate key exchange immediately for data with &gt;5 year sensitivity.</div>` : '';

    document.getElementById('res').innerHTML = `
  <div class="metrics">
    <div class="mc">
      <div class="mc-lbl">Quantum risk score</div>
      <div class="gauge-wrap">
        <div class="gauge">
          <svg viewBox="0 0 72 72"><circle cx="36" cy="36" r="${R}" fill="none" stroke="${bg}" stroke-width="8"/><circle cx="36" cy="36" r="${R}" fill="none" stroke="${rc}" stroke-width="8" stroke-dasharray="${fill} ${C}" stroke-linecap="round"/></svg>
          <div class="gnum"><div class="gnum-n" style="color:${tx}">${sc}</div><div class="gnum-l">/100</div></div>
        </div>
        <div><div style="font-size:15px;font-weight:500;color:${tx}">${lv}</div><div style="font-size:11px;color:var(--color-text-secondary);margin-top:2px">${d.labelTxt}</div></div>
      </div>
    </div>
    <div class="mc"><div class="mc-lbl">HNDL exposure</div><div class="mc-val ${d.hndl ? 'r' : 'g'}">${d.hndl ? 'YES' : 'NO'}</div><div class="mc-sub">${d.hndl ? 'active harvest risk' : 'no harvest risk'}</div></div>
    <div class="mc"><div class="mc-lbl">Algorithms assessed</div><div class="mc-val">${d.algos.length}</div><div class="mc-sub">${d.algos.filter(a => a.shors).length} broken by Shor's</div></div>
    <div class="mc"><div class="mc-lbl">NIST PQC deployed</div><div class="mc-val ${d.algos.some(a => a.pqc) ? 'g' : 'r'}">${d.algos.some(a => a.pqc) ? 'YES' : 'NO'}</div><div class="mc-sub">${d.algos.filter(a => a.pqc).length} of ${d.algos.length} algorithms</div></div>
    <div class="mc"><div class="mc-lbl">TLS version</div><div class="mc-val ${d.tls === 'TLS 1.3' ? 'g' : 'a'}">${d.tls}</div><div class="mc-sub">${d.tls === 'TLS 1.3' ? 'optimal' : 'upgrade needed'}</div></div>
  </div>

  ${hndlHtml}

  <div class="card">
    <div class="ctitle"><span class="dot ${dotCls}"></span>Risk score breakdown — weighted 8-factor model</div>
    ${sfHtml}
    <div style="margin-top:.75rem;padding:.6rem .85rem;background:${bg};border-radius:var(--border-radius-md);display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;font-weight:500;color:${tx}">Total quantum risk score</span>
      <span style="font-size:17px;font-weight:500;color:${tx}">${sc} / 100 — ${lv}</span>
    </div>
  </div>

  <div class="card">
    <div class="ctitle"><span class="dot b"></span>Cryptographic Bill of Materials (CBOM) — CERT-In Annexure-A schema</div>
    <table class="tbl"><thead><tr><th>Element</th><th>Value</th><th>Status</th></tr></thead><tbody>${cbomHtml}</tbody></table>
    <div class="lbl-strip">${lblHtml}</div>
  </div>

  <div class="card" id="crqc-card">
    <div class="ctitle"><span class="dot p"></span>CRQC attack simulation — Shor's &amp; Grover's algorithm models</div>
    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:.85rem">Select threat scenario to simulate what a Cryptographically Relevant Quantum Computer would break on this asset</div>
    <div class="tline">
      <div class="tnode"><div class="tcirc done">1</div><div class="tlbl">Classical<br>threats<br>(today)</div></div>
      <div class="tnode"><div class="tcirc warn">2</div><div class="tlbl">CRQC<br>imminent<br>~2030</div></div>
      <div class="tnode"><div class="tcirc done">3</div><div class="tlbl">CRQC<br>arrives<br>(full power)</div></div>
      <div class="tnode"><div class="tcirc ${d.labelKey === 'ready' ? 'ok' : 'dim'}">4</div><div class="tlbl">Post-CRQC<br>world<br>(PQC era)</div></div>
    </div>
    <div class="ctabs">
      <button class="ctab on" id="ct-arrived" onclick="setCRQC('arrived')">CRQC arrived (now)</button>
      <button class="ctab" id="ct-imminent" onclick="setCRQC('imminent')">2030 estimate</button>
      <button class="ctab" id="ct-classical" onclick="setCRQC('classical')">Classical only</button>
    </div>
    <div id="crqc-body">${buildCRQC(d)}</div>
  </div>

  <div class="card">
    <div class="ctitle"><span class="dot g"></span>Migration recommendations — full PQC transition plan</div>
    <div class="mig-summary">
      <span class="bx r">${d.mig.filter(m => m.pri === 'CRITICAL').length} critical</span>
      <span class="bx a">${d.mig.filter(m => m.pri === 'HIGH').length} high priority</span>
      <span class="bx b">${d.mig.filter(m => m.pri === 'MEDIUM').length} medium</span>
      <span class="bx gr">${d.mig.filter(m => m.pri === 'LOW').length} low / maintenance</span>
    </div>
    <table class="mig-table">
      <thead><tr><th>Priority</th><th>Area</th><th>Migration path</th><th>Detail</th><th>Standard</th><th>Effort</th></tr></thead>
      <tbody>${migHtml}</tbody>
    </table>
    <div style="margin-top:1rem">
      <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.04em">Migration roadmap</div>
      <div class="roadmap">${roadHtml}</div>
    </div>
  </div>

  ${d.raw_evidence ? `<div class="card">
    <div class="ctitle" style="cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
      <span class="dot b"></span>Raw scan evidence ▸ <span style="font-size:11px;color:var(--color-text-secondary);font-weight:400">(click to expand)</span>
    </div>
    <pre style="display:none;background:var(--color-background-secondary);padding:.75rem;border-radius:var(--border-radius-md);font-size:11.5px;overflow-x:auto;color:var(--color-text-primary);line-height:1.6;font-family:var(--font-mono,monospace)">${JSON.stringify(d.raw_evidence, null, 2)}</pre>
  </div>` : ''}
  `;
    document.getElementById('res').style.display = 'block';
  }

  function buildCRQC(d) {
    let brk = 0, wk = 0, safe = 0;
    const algoHtml = d.algos.map(a => {
      let isBroken, isWeak, note;
      if (crqcMode === 'classical') {
        isBroken = false; isWeak = false; note = 'Classically secure — no known polynomial-time classical attack';
      } else if (crqcMode === 'imminent') {
        isBroken = a.shors; isWeak = a.grovers && !a.shors;
        note = isBroken ? '[2030 est.] ' + a.note : isWeak ? '[Grover] ' + a.note : 'Quantum-safe in 2030 threat model';
      } else {
        isBroken = a.shors; isWeak = a.grovers && !a.shors; note = a.note;
      }
      if (isBroken) brk++; else if (isWeak) wk++; else safe++;
      const cls = isBroken ? 'broken' : isWeak ? 'weak' : 'safe';
      const icon = isBroken ? '✕' : isWeak ? '≈' : '✓';
      return `<div class="arow">
      <div class="aicon ${cls}">${icon}</div>
      <div style="flex:1">
        <div class="aname">${a.n} <span class="bx ${a.pqc ? 'g' : 'gr'}" style="font-size:10px">${a.pqc ? 'NIST PQC' : a.role}</span></div>
        <div class="anote">${note}</div>
      </div>
    </div>`;
    });
    const left = algoHtml.slice(0, 3).join(''), right = algoHtml.slice(3).join('');
    let verdict, vc;
    if (crqcMode === 'classical') {
      verdict = 'Classical threat model: all algorithms are secure against known classical attacks. No immediate quantum-specific action, but the HNDL window is open — recorded sessions are vulnerable once a CRQC arrives.'; vc = 'safe';
    } else if (brk === 0 && wk === 0) {
      verdict = 'Fully quantum-resilient under this threat model. No algorithms broken or weakened. NIST PQC standards satisfied.'; vc = 'safe';
    } else if (brk === 0) {
      verdict = `No algorithms broken outright, but ${wk} algorithm(s) weakened by Grover's — effective key lengths are halved. Migrate before CRQC deployment for long-lived sensitive data.`; vc = 'partial';
    } else {
      const when = crqcMode === 'imminent' ? 'By ~2030' : 'Upon CRQC arrival';
      verdict = `<strong>${when}, Shor's algorithm breaks ${brk} algorithm(s).</strong> All sessions protected by the current key exchange are retroactively decryptable (HNDL).${wk > 0 ? ' ' + wk + ' further algorithm(s) weakened by Grover\'s.' : ''} Immediate migration to ML-KEM / ML-DSA required.`; vc = 'threat';
    }
    return `<div style="display:flex;gap:8px;margin-bottom:.85rem;flex-wrap:wrap">
    <span class="bx r">${brk} broken by Shor's</span>
    <span class="bx a">${wk} weakened by Grover's</span>
    <span class="bx g">${safe} quantum-safe</span>
  </div>
  <div class="crqc-grid"><div>${left}</div><div>${right}</div></div>
  <div class="crqc-verdict ${vc}">${verdict}</div>`;
  }

  function setCRQC(m) {
    crqcMode = m;
    ['arrived', 'imminent', 'classical'].forEach(function (x) {
      document.getElementById('ct-' + x).className = 'ctab' + (x === m ? ' on' : '');
    });
    if (cur) document.getElementById('crqc-body').innerHTML = buildCRQC(cur);
  }
</script>
